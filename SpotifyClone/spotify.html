<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify</title>
    <link rel = "stylesheet" href="spotify.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" integrity="sha512-Kc323vGBEqzTmouAECnVceyQqyqdsSiqLQISBL29aUW4U/M7pSPA/gEUZQqv1cwx4OnYxTxve5UMg5GT6L4JJg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <div class="main">
        <div class="main1">
            <div class="box1">
               <div class="home">
                   <i class="fa-brands fa-spotify" style="color: #ffffff;"></i></i>
                  <b> <a href = "#Spotify" onclick="newTab">Spotify</a></b>
                   <div class="home">
                       <i class="fa-solid fa-house" style="color: #ffffff;"></i>
                       <a href="#Home">Home</a>
                   </div>
                   <div class="home">
                       <i class="fa-solid fa-magnifying-glass" style="color: #ffffff;"></i>
                       <a href = "#Search">Search</a>
                   </div>
            </div>
            <div class="box2">
               <div class="library">
                   <i class="fa-solid fa-book-bookmark" style="color: #ffffff;"></i>
                   <a href="#Your library">Your library</a>
                   <a href="+">+</a>
                   </div>
                   <iframe class="iframe-container" srcdoc="
                       <div class='box11'>
                           <h3>Create your first playlist</h3>
                           <p>It's easy we'll help you</p>
                           <button><a href='#'>Create Playlist</a></button>
                       </div>
                       <div class='box12'>
                           <h4>Let's find some podcasts to follow</h4>
                           <h5>We'll keep you updated on new episodes</h5>
                           <button><a href='#'>Browse Podcast</a></button>
                       </div>
                        ">
                  </iframe>
                </div>
                <div class="links">
                   <div class="line1">
                       <a href = "#">Legal</a>
                       <a href = "#"> Safety&PrivacyCenter </a>
                    </div>
                    <div class="line2">
                       <a href = "#">Privacy Policy </a>
                       <a href = "#">Cookies </a>
                       <a href = "#">About adds</a>
                    </div>
                    <div class="line1">
                       <a href = "#">Accessibility</a>
                    </div>
                    <a href = "#">Cookies</a>
               </div>
                </div>
                <button class="btn2">
                   <i class="fa-solid fa-globe" style="color: #ffffff;"></i>
                   <h5>English</h5>
                </button>
           <div class="main2">
               <div class="header">
                  <div class="leftRight">
                   <a href="#"><</a>
                   <a href="#">></a>
                  </div>
               </div>
           </div>
           </div>
    </div>




    <script href="spotify.js"></script>
</body>
</html>
