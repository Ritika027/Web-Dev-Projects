<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency convertor</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer" />
<link rel="stylesheet" href="currency convertor.css">
</head>
<body>
    <div class="container">
        <h2 class="heading">Currency convertor</h2>
      <form>
        <div class="amount">
            <p class="p1">Enter Amount</p>
            <input value="100" type="text" style="border-radius: 6px; height: 2rem; justify-content: center; border-width: 1px; width: 300px; margin-left: 20px;">
        </div>
        <div class="dropdown">
            <div class="from">
                <p>From</p>
                <div class="select-container">
                    <img src="https://flagsapi.com/US/flat/64.png" height="40px" width="40px">
                    <select name="from" style="border-width: 0px;">
                        <option value="USD">USD</option>
                        <option value="INR">INR</option>
                        <option value="EUR">EUR</option>
                        <option value="AUD">AUD</option>
                    </select>
                </div>
            </div>
           <div class="icon">
            <i class="fa-solid fa-arrow-right-arrow-left"></i>
           </div>
            <div class="to">
                <p>To</p>
                <div class="select-container">
                    <img src="https://flagsapi.com/IN/flat/64.png" height="40px" width="40px">
                    <select name="from" style="border-width: 0px;>
                         <option value="USD">USD</option>
                        <option value="INR" selected>INR</option>
                        <option value="EUR">EUR</option>
                        <option value="AUD">AUD</option> 
                    </select>
                </div>
            </div>
        </div>
        <div class="msg">1USD=80INR</div>
        <button class="btn1">Get Exchange Rate</button>
      </form>
    </div>
    <link rel="stylesheet" href="currency convertor.css">
    <script src="codes.js"></script>
    <script src="currency convertor.js"></script>
</body>
</html>
